<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somni — Confirming your email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0D0B1A;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; color: #9B6FD0; }
    p { font-size: 16px; color: #9B9BB0; line-height: 1.6; }
  </style>
</head>
<body>
  <div>
    <h1>Confirming your email…</h1>
    <p>Redirecting you back to Somni.<br>If nothing happens, please reopen the app.</p>
  </div>
  <script>
    var search = new URLSearchParams(window.location.search);
    var hash = window.location.hash;

    // Hash format: #access_token=... (old Supabase)
    if (hash) {
      var hashParams = new URLSearchParams(hash.replace('#', '?'));
      var accessToken = hashParams.get('access_token');
      var refreshToken = hashParams.get('refresh_token');
      var hashType = hashParams.get('type') || 'signup';
      if (accessToken) {
        window.location.href = 'somni://confirm#access_token=' + accessToken + '&refresh_token=' + refreshToken + '&type=' + hashType;
      }
    }

    // Token format: ?token=...&type=signup (new template using {{ .Token }})
    var token = search.get('token');
    var email = search.get('email') || '';
    var queryType = search.get('type') || 'signup';
    if (token) {
      var SUPABASE_URL = 'https://ihdashedivsogctcepoi.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZGFzaGVkaXZzb2djdGNlcG9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzkwMTc2NTMsImV4cCI6MjA1NDU5MzY1M30.3ep0MM3CR5jkDGTMKsGEFZIObkHMdF2rHWhGgMPvFig';

      fetch(SUPABASE_URL + '/auth/v1/verify', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          token: token,
          type: queryType,
          email: email
        })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.access_token && data.refresh_token) {
          window.location.href = 'somni://confirm#access_token=' + data.access_token + '&refresh_token=' + data.refresh_token + '&type=' + queryType;
        } else {
          document.querySelector('h1').textContent = 'Confirmation failed';
          document.querySelector('p').textContent = 'Please try signing up again or contact support.';
        }
      })
      .catch(function() {
        document.querySelector('h1').textContent = 'Something went wrong';
        document.querySelector('p').textContent = 'Please reopen Somni and try again.';
      });
    }
  </script>
</body>
</html>
