<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somni — Confirming your email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D0B1A;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; color: #9B6FD0; }
    p { font-size: 16px; color: #9B9BB0; line-height: 1.6; }
  </style>
</head>
<body>
  <div>
    <h1>Confirming your email…</h1>
    <p>Redirecting you back to Somni.<br>If nothing happens, please reopen the app.</p>
  </div>
  <script>
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken) {
      window.location.href = `somni://confirm#access_token=${accessToken}&refresh_token=${refreshToken}&type=signup`;
    } else {
      const search = new URLSearchParams(window.location.search);
      const tokenHash = search.get('token_hash');
      if (tokenHash) {
        window.location.href = `somni://confirm?token_hash=${tokenHash}&type=email`;
      }
    }
  </script>
</body>
</html>
