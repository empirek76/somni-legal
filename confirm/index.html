<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somni — Confirming your email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D0B1A;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; color: #9B6FD0; }
    p { font-size: 16px; color: #9B9BB0; line-height: 1.6; }
  </style>
</head>
<body>
  <div>
    <h1>Confirming your email…</h1>
    <p>Redirecting you back to Somni.<br>If nothing happens, please reopen the app.</p>
  </div>
  <script>
    const hash = window.location.hash;
    if (hash) {
      const params = new URLSearchParams(hash.replace('#', '?'));
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type = params.get('type');
      if (accessToken) {
        window.location.href = `somni://confirm#access_token=${accessToken}&refresh_token=${refreshToken}&type=${type || 'signup'}`;
        return;
      }
    }

    const search = new URLSearchParams(window.location.search);
    const tokenHash = search.get('token_hash');
    const type = search.get('type') || 'email';

    if (tokenHash) {
      window.location.href = `https://ihdashedivsogctcepoi.supabase.co/auth/v1/verify?token=${tokenHash}&type=${type}&redirect_to=somni://confirm`;
    }
  </script>
</body>
</html>
